data:
  train_dir: "data/train_data"
  test_dir: "data/test_data"
  window_size: 1000
  stride: 500
  sampling_rate: 1000
  normalization: "per_file"
  random_seed: 42
  num_workers: 4

kfold:
  n_splits: 5
  shuffle: true

model:
  name: "cnn1d"
  in_channels: 7
  num_classes: 5
  cnn_channels: [64, 128, 256]
  cnn_kernels: [7, 5, 3]
  cnn_strides: [2, 2, 2]
  dropout: 0.5

training:
  batch_size: 128
  epochs: 100
  lr: 0.001
  weight_decay: 0.001
  early_stop_patience: 10
  device: "cuda"
  log_interval: 10
  save_dir: "experiments"

augmentation:
  gaussian_noise:
    prob: 0.5
    std: 0.01
  amplitude_scale:
    prob: 0.3
    scale_min: 0.95
    scale_max: 1.05
  time_warp:
    prob: 0.0
    max_warp: 0.1

evaluation:
  confidence_level: 0.95
  bootstrap_iterations: 1000

ablation:
  enabled: false
  experiment: "A1"
